<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>TheBridge</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="assets/img/favicon1.png" rel="icon" />

    <!-- Preload LCP hero image -->
    <link rel="preload" as="image" href="assets/img/hero-img.webp" fetchpriority="high" />

    <!-- Preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://9antrabackend-production.up.railway.app" />
    <link rel="preconnect" href="https://9antrabackend-production.up.railway.app" crossorigin />

    <!-- Suppress Google Translate toolbar before any script runs -->
    <style>
      .goog-te-banner-frame,
      .goog-te-banner-frame.skiptranslate,
      iframe.skiptranslate { display: none !important; height: 0 !important; }
      body { top: 0 !important; }
      .skiptranslate > iframe { display: none !important; }
    </style>

    <!-- Vendor CSS — non-blocking (loads after first paint) -->
    <link href="assets/vendor/aos/aos.css" rel="stylesheet" media="print" onload="this.media='all'" />
    <link href="assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet" media="print" onload="this.media='all'" />
    <link href="assets/vendor/swiper/swiper-bundle.min.css" rel="stylesheet" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="assets/css1/bootstrap.min.css" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="assets/css1/datatables.min.css" media="print" onload="this.media='all'" />

    <!-- Fallback for no-JS environments -->
    <noscript>
      <link href="assets/vendor/aos/aos.css" rel="stylesheet" />
      <link href="assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet" />
      <link href="assets/vendor/swiper/swiper-bundle.min.css" rel="stylesheet" />
      <link rel="stylesheet" href="assets/css1/bootstrap.min.css" />
      <link rel="stylesheet" href="assets/css1/datatables.min.css" />
    </noscript>

    <!-- Required before Angular bundle: polyfill for node-style `global` -->
    <script type="application/javascript">
      var global = window;
    </script>

    <!-- MDB + Simple Slider: defer so they don't block first paint -->
    <script defer src="assets/js/mdb.min.js"></script>
    <script defer src="assets/js/Simple-Slider-swiper-bundle.min.js"></script>
    <script defer src="assets/js/Simple-Slider.js"></script>

    <!-- jQuery + DataTables: deferred so they don't block first paint,
         but still run before Angular's type="module" scripts -->
    <script defer src="assets/js1/jquery-3.6.0.min.js"></script>
    <script defer src="assets/js1/datatables.min.js"></script>

    <!-- Deferred: only needed for PDF export, not for initial render -->
    <script defer src="assets/js1/pdfmake.min.js"></script>
    <script defer src="assets/js1/vfs_fonts.js"></script>
    <script defer src="assets/js1/custom.js"></script>
  </head>
  <body class="mat-typography">
    <app-root></app-root>

    <!-- Vendor scripts — async, independent of Angular -->
    <script async src="assets/vendor/aos/aos.js"></script>
    <script async src="assets/vendor/glightbox/js/glightbox.min.js"></script>
    <script async src="assets/vendor/swiper/swiper-bundle.min.js"></script>
    <script async src="assets/js/main.js"></script>

    <!-- Google Translate: hidden widget + programmatic switcher -->
    <div id="google_translate_element" class="gt-hidden-widget"></div>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'fr,ar',
          autoDisplay: false
        }, 'google_translate_element');
      }
      function setLang(lang) {
        if (lang === 'en') {
          document.cookie = 'googtrans=; path=/; expires=Thu,01 Jan 1970 00:00:00 GMT';
          document.cookie = 'googtrans=; path=/; domain=.' + window.location.hostname + '; expires=Thu,01 Jan 1970 00:00:00 GMT';
          window.location.reload();
          return;
        }
        var select = document.querySelector('#google_translate_element select');
        if (!select) { setTimeout(function() { setLang(lang); }, 300); return; }
        select.value = lang;
        select.dispatchEvent(new Event('change'));
      }

      /* Interval-based suppression — runs every 250ms to catch GT's late injection */
      setInterval(function() {
        document.querySelectorAll('.goog-te-banner-frame, iframe.skiptranslate').forEach(function(el) {
          el.style.setProperty('display', 'none', 'important');
          el.style.setProperty('height', '0', 'important');
        });
        if (document.body) document.body.style.setProperty('top', '0', 'important');
      }, 250);
    </script>
    <script defer src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
