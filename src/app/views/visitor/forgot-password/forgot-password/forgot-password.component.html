<section class="auth-section">
  <div class="container">
    <div class="row align-items-center justify-content-center g-5">

      <div class="col-lg-4 auth-illustration order-lg-2" data-aos="zoom-in">
        <img src="assets/img/new password.png" alt="Forgot password" loading="lazy" />
      </div>

      <div class="col-lg-5 order-lg-1" data-aos="fade-up">
        <div class="form-card">
          <h1 class="form-title">Forgot your password?</h1>
          <p class="form-subtitle">Enter the email linked to your account and we'll send you a reset code.</p>

          <form #forgotForm="ngForm" (ngSubmit)="save()" role="form">
            <div class="form__group">
              <label class="form__label" for="forgotEmail">Email Address</label>
              <input
                [(ngModel)]="emaili"
                type="email"
                class="form__field"
                placeholder="you@example.com"
                name="name"
                id="forgotEmail"
                required
                email
                #emailInput="ngModel" />
              <span class="field-error" *ngIf="emailInput.touched && emailInput.errors?.['required']">Email is required</span>
              <span class="field-error" *ngIf="emailInput.touched && emailInput.errors?.['email']">Please enter a valid email address</span>
            </div>

            <button class="btn-form-primary" type="submit" [disabled]="!forgotForm.form.valid || isLoading">
              <span *ngIf="!isLoading">Send Reset Code</span>
              <span *ngIf="isLoading">Sending...</span>
            </button>

            <div class="form-link-row mt-3">
              Remember your password? <a routerLink="/login">Sign in</a>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</section>
