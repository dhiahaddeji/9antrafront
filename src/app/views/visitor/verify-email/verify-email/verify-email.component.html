<section class="auth-section">
  <div class="container">
    <div class="row align-items-center justify-content-center g-5">

      <div class="col-lg-4 auth-illustration order-lg-2" data-aos="zoom-in">
        <img src="assets/img/new password.png" alt="Verify email" />
      </div>

      <div class="col-lg-5 order-lg-1" data-aos="fade-up">
        <div class="form-card">
          <h1 class="form-title">Check your email</h1>
          <p class="form-subtitle">We sent a verification code to your email address. Enter it below to continue.</p>

          <form role="form">
            <div class="form__group">
              <label class="form__label" for="verifyCode">Verification Code</label>
              <input
                [(ngModel)]="code"
                name="code"
                type="text"
                class="form__field"
                placeholder="Enter the code"
                id="verifyCode"
                required />
            </div>

            <div class="field-error mb-3" *ngIf="etat">{{ msj }}</div>

            <button class="btn-form-primary" type="button" (click)="checkPassword()">
              Verify Code
            </button>

            <div class="form-link-row mt-3">
              <a routerLink="/forgotpassword">Resend code</a>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</section>
