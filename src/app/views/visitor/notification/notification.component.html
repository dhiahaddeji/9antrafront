<div class="notif-wrapper" #notifWrapper>
  <button
    class="notification-button"
    *ngIf="isLoggedIn()"
    (click)="toggleDropdown()"
  >
    <i class="bi bi-bell" aria-hidden="true"></i>
    <span *ngIf="notificationsNotSeen.length > 0" class="notif-badge">
      {{ notificationsNotSeen.length }}
    </span>
  </button>

  <div class="notif-panel" *ngIf="isOpen" [style.top]="panelTop" [style.left]="panelLeft" [style.right]="panelRight">
    <div class="notif-panel-header">
      <h2 class="notif-panel-title">Notifications</h2>
      <button
        *ngIf="notifications && notifications.length > 0"
        class="notif-clear-btn"
        (click)="deleteAll()"
      >Clear all</button>
    </div>
    <div class="notif-divider"></div>

    <!-- Empty state -->
    <div class="notif-empty" *ngIf="!notifications || notifications.length === 0">
      <i class="bi bi-bell-slash"></i>
      <p>No notifications yet</p>
    </div>

    <!-- Notification list -->
    <ul class="notif-list" *ngIf="notifications && notifications.length > 0">
      <li
        class="notif-item"
        *ngFor="let i of notifications"
        [class.notif-unseen]="i.status !== -1"
        (click)="changeStatusToSeenDetails(i.id)"
      >
        <div class="notif-item-inner" [routerLink]="i.link">
          <div class="notif-avatar">
            <img src="../../../../assets/img/9ant.webp" alt="notif" loading="lazy">
          </div>
          <div class="notif-content">
            <div class="notif-item-title">{{ i.title }}</div>
            <div class="notif-item-msg">{{ i.message }}</div>
            <div class="notif-item-time">
              {{ i.created_at?.substring(0,10) }} {{ i.created_at?.substring(11,16) }}
            </div>
          </div>
          <span *ngIf="i.status !== -1" class="notif-dot"></span>
        </div>
        <button class="notif-delete-btn" (click)="$event.stopPropagation(); changeStatusToDeleted(i.id)">
          <i class="bi bi-x"></i>
        </button>
      </li>
    </ul>

    <div class="notif-footer" *ngIf="notifications && notifications.length > 0">
      <a routerLink="/notificationList" (click)="isOpen = false">See all notifications</a>
    </div>
  </div>
</div>
