<!-- Contact Section -->
<section id="contact" class="contact" style="padding: 80px 0 100px; background: #f3f4f6;">
  <div class="container" data-aos="fade-up">

    <div class="section-title text-center mb-5">
      <h2>Get in Touch</h2>
      <p style="color:#6b7280; font-size:0.95rem;">Have a question or want to work together? We'd love to hear from you.</p>
    </div>

    <div class="row g-0 shadow-sm" style="border-radius:16px; overflow:hidden; background:#fff; max-width:960px; margin:0 auto;">

      <!-- Illustration -->
      <div class="col-lg-5 d-none d-lg-flex align-items-center justify-content-center" style="background:#fdf2f7; padding:40px;">
        <img src="assets/img/contact.png" alt="Contact" class="img-fluid" style="max-height:360px;" />
      </div>

      <!-- Form -->
      <div class="col-lg-7 p-4 p-md-5">
        <form [formGroup]="contactForm" (submit)="onSubmit()">

          <div class="row g-3">
            <div class="col-sm-6">
              <div class="form__group">
                <label class="form__label" for="contactFirstName">First Name</label>
                <input
                  type="text"
                  class="form__field"
                  formControlName="firstName"
                  id="contactFirstName"
                  placeholder="John" />
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form__group">
                <label class="form__label" for="contactLastName">Last Name</label>
                <input
                  type="text"
                  class="form__field"
                  formControlName="lastName"
                  id="contactLastName"
                  placeholder="Doe" />
              </div>
            </div>
          </div>

          <div class="row g-3">
            <div class="col-sm-6">
              <div class="form__group">
                <label class="form__label" for="contactEmail">Email</label>
                <input
                  type="email"
                  class="form__field"
                  formControlName="email"
                  id="contactEmail"
                  placeholder="you@example.com" />
                <span class="field-error"
                  *ngIf="contactForm.get('email')?.dirty && contactForm.get('email')?.errors?.['email']">
                  Invalid email address
                </span>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form__group">
                <label class="form__label" for="contactSubject">Subject</label>
                <input
                  type="text"
                  class="form__field"
                  formControlName="subject"
                  id="contactSubject"
                  placeholder="How can we help?" />
              </div>
            </div>
          </div>

          <div class="form__group">
            <label class="form__label" for="contactMessage">Message</label>
            <textarea
              class="form__field"
              formControlName="message"
              id="contactMessage"
              rows="5"
              placeholder="Write your message here..."
              required></textarea>
          </div>

          <button
            type="submit"
            class="btn-form-primary"
            [disabled]="isLoading || uploadInProgress">
            <span *ngIf="uploadInProgress" class="spinner-border spinner-border-sm me-2" role="status"></span>
            <span>{{ uploadInProgress ? 'Sending...' : 'Send Message' }}</span>
          </button>

        </form>
      </div>
    </div>

  </div>
</section>
