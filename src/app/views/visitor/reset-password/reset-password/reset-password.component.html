
 <!-- ======= forgot password Section ======= -->
 <section id="forgotpassword" class="forgotpassword" style="margin-top: 140px; margin-bottom: 130px;">
    <div class="container">
      <div class="row justify-content-between">
        <div class="col-lg-5 d-flex flex-column justify-content-center pt-4 pt-lg-0 order-2 order-lg-1" data-aos="fade-up" data-aos-delay="200">
            <h1 class="text-center">New password</h1>
            <h5 class="text-center mb-3 mt-3">Please enter the new password and<br> Make sure you remember it </h5>
              <form #resetForm="ngForm" (ngSubmit)="Change()" method="post" role="form" class="php-email-form">
                <div class="form__group field">
                  <input [(ngModel)]="pass1" type="password" class="form__field" placeholder="New Password" name="NewPassword" id='NewPassword' required minlength="6" #pass1Input="ngModel" />
                  <label for="NewPassword" class="form__label">New Password</label>
                  <div class="alert alert-danger" *ngIf="pass1Input.touched && pass1Input.invalid">
                    <div *ngIf="pass1Input?.errors?.['required']">Password is required!</div>
                    <div *ngIf="pass1Input?.errors?.['minlength']">Password must be at least 6 characters!</div>
                  </div>
                </div>
                <div class="form__group field">
                  <input  [(ngModel)]="pass2" type="password" class="form__field" placeholder="Confirm Password" name="ConfirmPassword" id='ConfirmPassword' required minlength="6" #pass2Input="ngModel" />
                  <label for="ConfirmPassword" class="form__label">Confirm password</label>
                  <div class="alert alert-danger" *ngIf="pass2Input.touched && pass2Input.invalid">
                    <div *ngIf="pass2Input?.errors?.['required']">Confirm password is required!</div>
                    <div *ngIf="pass2Input?.errors?.['minlength']">Password must be at least 6 characters!</div>
                  </div>
                  <div class="alert alert-danger" *ngIf="pass1 && pass2 && pass1 !== pass2 && pass2Input.touched">
                    Passwords do not match!
                  </div>
                </div>
              <div class="mt-5 text-center"><button class="col-lg-5 mt-2 register btn" type="submit" [disabled]="!resetForm.form.valid || pass1 !== pass2">Save</button></div>
            </form>
          
        </div>
        <div class="col-lg-4 order-1 order-lg-2 photo" data-aos="zoom-in" data-aos-delay="200">
          <img src="assets/img/new password.png" class="img-fluid w-75" alt="">
        </div>
      </div>
    </div>

  </section><!-- End forgot password -->
