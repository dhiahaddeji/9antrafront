<section class="auth-section">
  <div class="container">
    <div class="row align-items-center justify-content-center g-5">

      <div class="col-lg-4 auth-illustration order-lg-2" data-aos="zoom-in">
        <img src="assets/img/new password.png" alt="Reset password" loading="lazy" />
      </div>

      <div class="col-lg-5 order-lg-1" data-aos="fade-up">
        <div class="form-card">
          <h1 class="form-title">Set new password</h1>
          <p class="form-subtitle">Choose a strong password you haven't used before.</p>

          <form #resetForm="ngForm" (ngSubmit)="Change()" role="form">

            <div class="form__group">
              <label class="form__label" for="newPassword">New Password</label>
              <input
                [(ngModel)]="pass1"
                type="password"
                class="form__field"
                placeholder="At least 6 characters"
                name="NewPassword"
                id="newPassword"
                required
                minlength="6"
                #pass1Input="ngModel" />
              <span class="field-error" *ngIf="pass1Input.touched && pass1Input.errors?.['required']">Password is required</span>
              <span class="field-error" *ngIf="pass1Input.touched && pass1Input.errors?.['minlength']">Password must be at least 6 characters</span>
            </div>

            <div class="form__group">
              <label class="form__label" for="confirmPassword">Confirm Password</label>
              <input
                [(ngModel)]="pass2"
                type="password"
                class="form__field"
                placeholder="Repeat your password"
                name="ConfirmPassword"
                id="confirmPassword"
                required
                minlength="6"
                #pass2Input="ngModel" />
              <span class="field-error" *ngIf="pass2Input.touched && pass2Input.errors?.['required']">Please confirm your password</span>
              <span class="field-error" *ngIf="pass2Input.touched && pass2Input.errors?.['minlength']">Password must be at least 6 characters</span>
              <span class="field-error" *ngIf="pass1 && pass2 && pass1 !== pass2 && pass2Input.touched">Passwords do not match</span>
            </div>

            <button class="btn-form-primary" type="submit" [disabled]="!resetForm.form.valid || pass1 !== pass2">
              Save New Password
            </button>

          </form>
        </div>
      </div>

    </div>
  </div>
</section>
