<section class="auth-section">
  <div class="container">
    <div class="row align-items-center justify-content-center g-5">

      <!-- Illustration -->
      <div class="col-lg-5 auth-illustration order-lg-2" data-aos="zoom-in" data-aos-delay="100">
        <img src="assets/img/login.webp" alt="Login illustration" loading="lazy" />
      </div>

      <!-- Form -->
      <div class="col-lg-5 order-lg-1" data-aos="fade-up" data-aos-delay="200">
        <div class="form-card">
          <h1 class="form-title">Welcome back</h1>
          <p class="form-subtitle">Sign in to your account to continue</p>

          <!-- OAuth login -->
          <div class="social-login-btns">
            <button type="button" class="btn-social btn-google" (click)="loginWithOAuth2('google')">
              <i class="bi bi-google me-2"></i>Continue with Google
            </button>
            <button type="button" class="btn-social btn-github" (click)="loginWithOAuth2('github')">
              <i class="bi bi-github me-2"></i>Continue with GitHub
            </button>
          </div>

          <div class="divider"><span>or sign in with email</span></div>

          <form #loginForm="ngForm" (ngSubmit)="login(loginForm)" role="form">
            <div *ngIf="isLoading" class="loader"></div>

            <div class="form__group">
              <label class="form__label" for="email">Email address</label>
              <input
                type="email"
                name="username"
                id="email"
                class="form__field"
                placeholder="you@example.com"
                [(ngModel)]="email"
                required />
              <span class="field-error" *ngIf="email && !isValidEmail(email)">
                Please enter a valid email address
              </span>
            </div>

            <div class="form__group">
              <label class="form__label" for="password">Password</label>
              <input
                [(ngModel)]="password"
                name="password"
                type="password"
                id="password"
                class="form__field"
                placeholder="Enter your password"
                required />
            </div>

            <div class="text-end mb-3">
              <a routerLink="/forgotpassword" class="form-link-row forgot-link">Forgot password?</a>
            </div>

            <button class="btn-form-primary" type="submit"
              [disabled]="!email || !password || !isValidEmail(email) || isLoading">
              {{ isLoading ? 'Signing in...' : 'Sign In' }}
            </button>

            <div class="form-link-row mt-3">
              Don't have an account? <a routerLink="/signup">Create one</a>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</section>
