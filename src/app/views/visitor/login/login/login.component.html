<section class="auth-section">
  <div class="container">
    <div class="row align-items-center justify-content-center g-5">

      <!-- Illustration -->
      <div class="col-lg-5 auth-illustration order-lg-2" data-aos="zoom-in" data-aos-delay="100">
        <img src="assets/img/login.png" alt="Login illustration" />
      </div>

      <!-- Form -->
      <div class="col-lg-5 order-lg-1" data-aos="fade-up" data-aos-delay="200">
        <div class="form-card">
          <h1 class="form-title">Welcome back</h1>
          <p class="form-subtitle">Sign in to your account to continue</p>

          <!-- Social login -->
          <div class="social-icons">
            <a href="#" (click)="loginWithOAuth2('google'); $event.preventDefault()" aria-label="Google" title="Login with Google"><i class="bi bi-google"></i></a>
            <a href="#" (click)="loginWithOAuth2('github'); $event.preventDefault()" aria-label="GitHub" title="Login with GitHub"><i class="bi bi-github"></i></a>
            <a href="#" (click)="loginWithOAuth2('facebook'); $event.preventDefault()" aria-label="Facebook" title="Login with Facebook"><i class="bi bi-facebook"></i></a>
            <a href="#" aria-label="LinkedIn"><i class="bi bi-linkedin"></i></a>
          </div>

          <div class="form-divider">or sign in with email</div>

          <form #loginForm="ngForm" (ngSubmit)="login(loginForm)" role="form">
            <div *ngIf="isLoading" class="loader"></div>

            <div class="form__group">
              <label class="form__label" for="email">Email address</label>
              <input
                type="email"
                name="username"
                id="email"
                class="form__field"
                placeholder="you@example.com"
                [(ngModel)]="email"
                required />
              <span class="field-error" *ngIf="email && !isValidEmail(email)">
                Please enter a valid email address
              </span>
            </div>

            <div class="form__group">
              <label class="form__label" for="password">Password</label>
              <input
                [(ngModel)]="password"
                name="password"
                type="password"
                id="password"
                class="form__field"
                placeholder="Enter your password"
                required />
            </div>

            <div class="text-end mb-3">
              <a routerLink="/forgotpassword" class="form-link-row" style="font-size:0.85rem;">Forgot password?</a>
            </div>

            <button class="btn-form-primary" type="submit"
              [disabled]="!email || !password || !isValidEmail(email) || isLoading">
              {{ isLoading ? 'Signing in...' : 'Sign In' }}
            </button>

            <div class="form-link-row mt-3">
              Don't have an account? <a routerLink="/signup">Create one</a>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</section>
