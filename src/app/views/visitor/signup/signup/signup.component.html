<section class="auth-section">
  <div class="container">
    <div class="row align-items-center justify-content-center g-5">

      <!-- Illustration -->
      <div class="col-lg-5 auth-illustration order-lg-2" data-aos="zoom-in" data-aos-delay="100">
        <img src="assets/img/login.png" alt="Sign up illustration" />
      </div>

      <!-- Form -->
      <div class="col-lg-5 order-lg-1" data-aos="fade-up" data-aos-delay="200">
        <div class="form-card">
          <h1 class="form-title">Create an account</h1>
          <p class="form-subtitle">Join us today — it's free</p>

          <div *ngIf="isLoading" class="loader"></div>

          <form [formGroup]="SignUpForm" (ngSubmit)="SignUp()">

            <div class="row g-3">
              <div class="col-sm-6">
                <div class="form__group">
                  <label class="form__label" for="firstName">First Name</label>
                  <input
                    type="text"
                    [formControl]="FirstNameForm"
                    id="firstName"
                    class="form__field"
                    placeholder="John" />
                  <span class="field-error" *ngIf="FirstNameForm.invalid && FirstNameForm.touched">
                    {{ getFirstNameFormError() }}
                  </span>
                </div>
              </div>
              <div class="col-sm-6">
                <div class="form__group">
                  <label class="form__label" for="lastName">Last Name</label>
                  <input
                    type="text"
                    [formControl]="LastNameForm"
                    id="lastName"
                    class="form__field"
                    placeholder="Doe" />
                  <span class="field-error" *ngIf="LastNameForm.invalid && LastNameForm.touched">
                    {{ getLastNameFormError() }}
                  </span>
                </div>
              </div>
            </div>

            <div class="form__group">
              <label class="form__label" for="phone">Phone Number</label>
              <input
                type="tel"
                [formControl]="NumTlfForm"
                id="phone"
                class="form__field"
                placeholder="+216 XX XXX XXX" />
              <span class="field-error" *ngIf="NumTlfForm.invalid && NumTlfForm.touched">
                {{ getNumTlfFormError() }}
              </span>
            </div>

            <div class="form__group">
              <label class="form__label" for="signupEmail">Email Address</label>
              <input
                type="email"
                [formControl]="EmailForm"
                id="signupEmail"
                class="form__field"
                placeholder="you@example.com" />
              <span class="field-error" *ngIf="EmailForm.invalid && EmailForm.touched">
                {{ getEmailFormError() }}
              </span>
            </div>

            <div class="form__group">
              <label class="form__label" for="signupPassword">Password</label>
              <input
                type="password"
                [formControl]="passwordForm"
                id="signupPassword"
                class="form__field"
                placeholder="At least 6 characters" />
              <span class="field-error" *ngIf="passwordForm.invalid && passwordForm.touched">
                {{ getPasswordFormError() }}
              </span>
            </div>

            <div class="form__group">
              <label class="form__label" for="country">Country</label>
              <select
                [formControl]="CountryForm"
                id="country"
                class="form__field">
                <option value="" disabled selected>Select your country</option>
                <option value="Tunisia">Tunisia</option>
                <option value="Algeria">Algeria</option>
              </select>
              <span class="field-error" *ngIf="CountryForm.invalid && CountryForm.touched">
                {{ getCountryFormError() }}
              </span>
            </div>

            <button class="btn-form-primary" type="submit">Create Account</button>

            <div class="form-link-row mt-3">
              Already have an account? <a routerLink="/login">Sign in</a>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</section>
