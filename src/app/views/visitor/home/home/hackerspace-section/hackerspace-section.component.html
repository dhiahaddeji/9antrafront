<!-- ======= Hackerspaces Section ======= -->
<section id="hackerspaces" class="hackerspaces section-bg">
  <div class="container" data-aos="fade-up">
    <div class="section-title">
      <h2>Our Hackerspaces</h2>
      <h1>Find a Hackerspace Near You</h1>
    </div>

    <div class="row d-flex justify-content-center" *ngIf="hackerspaces.length > 0">
      <div
        class="col-lg-4 col-md-6 mb-4"
        *ngFor="let h of hackerspaces"
        data-aos="zoom-in"
        data-aos-delay="100"
      >
        <div class="hackerspace-card">
          <div class="card-img-wrap">
            <img
              [src]="h.localPhoto || 'assets/Documents/' + h.photo"
              class="img-fluid"
              alt="{{ h.region }}"
              loading="lazy"
            />
          </div>
          <div class="card-content">
            <h4><i class="bi bi-geo-alt me-2"></i>{{ h.region }}</h4>
            <p class="address"><i class="bi bi-building me-2"></i>{{ h.adresse }}</p>
            <p class="email"><i class="bi bi-envelope me-2"></i>{{ h.email }}</p>
            <a [routerLink]="['/hackerspace', h.region]" class="btn-visit">Visit Us</a>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="hackerspaces.length === 0" class="text-center mt-3">
      <p>No hackerspaces available at the moment.</p>
    </div>
  </div>
</section>
<!-- End Hackerspaces Section -->
