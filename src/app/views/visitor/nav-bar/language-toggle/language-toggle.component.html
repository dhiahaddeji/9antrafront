<div class="lang-toggle">
  <button class="lang-btn" [class.active]="activeLang === 'en'" (click)="setLang('en')">EN</button>
  <button class="lang-btn" [class.active]="activeLang === 'fr'" (click)="setLang('fr')">FR</button>
  <button class="lang-btn" [class.active]="activeLang === 'ar'" (click)="setLang('ar')">AR</button>
</div>
