<main id="main">
    <div style="margin-bottom: 50px; " class="d-block d-lg-none"> </div>
    <div class="row justify-content-between">
        <div class="col-8">
            <div class="pagetitle">
                <h1>Lessons</h1>
                <nav>
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                        <li class="breadcrumb-item active">Lessons</li>
                    </ol>
                </nav>
            </div>
        </div>

        <div class="col-4 d-flex align-items-center justify-content-center ">
            <button type="button" class="btn register mb-3" routerLink="add"><i class="fa-solid fa-plus"></i> Add
                new</button>
        </div>

        <div class="row">
            <div  *ngFor="let l of lessons" class="card card-md ml-2" style="width: 30%;">
                <div class="card-title">
                    <div class="card-text">
                      <div><a class="d-flex justify-content-end" (click)="delete(l.id)"><i class="bi bi-trash-fill" style="color: red;font-size: 20px;margin: 10px 10px 0px 0px;cursor: pointer;"></i></a></div>
                        <div class="d-flex justify-content-center mt-2" style="font-weight: bold;">{{ l.title }}</div>


                    </div>
                </div>
                <div class="card-body card-body d-flex flex-column align-items-center">
                    <div>
                        <video controls class="img-fluid" [poster]="getThumbNail(l)">
                            <source [src]="getVideo(l)">
                        </video>
                    </div>
                    <div class="card-text mt-3"><span class="bg-danger text-white rounded p-1">Chapter :</span> {{ l.chapterTitle }}</div>
                </div>
            </div>
            <div *ngIf="lessons?.length == 0" class="text-center mt-3 d-flex justify-content-center">
              <div class="nodata">
                <img src="../../../../../assets/img/nodata.webp" width="250px" loading="lazy"><br>
                <p style="overflow: hidden;">There are no lessons available.</p>
              </div>
            </div>
        </div>
    </div>
</main>
