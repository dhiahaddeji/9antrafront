<main class="gx-5 pt-3" (click)="closeMenu()">
  <div class="d-lg-none d-md-block"><br /><br /><br /></div>

  <!-- Header -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div class="pagetitle mb-0">
      <h1>Chapters</h1>
      <nav>
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a routerLink="/admin">Home</a></li>
          <li class="breadcrumb-item active">Chapters</li>
        </ol>
      </nav>
    </div>
    <button type="button" class="btn ch-add-btn px-4 py-2" routerLink="/admin/chapters/Add">
      <i class="bi bi-plus-lg me-2"></i>Add New
    </button>
  </div>

  <!-- Grid -->
  <div class="row g-4">
    <ng-container *ngFor="let formation of tabFormation">
      <div class="col-xl-4 col-md-6"
           *ngFor="let chapter of chaptersByFormation[formation.nomFormation]">
        <div class="ch-card">
          <div class="ch-card-header">
            <span class="ch-card-title">{{ chapter.title }}</span>
            <div class="position-relative">
              <button type="button" class="ch-menu-btn" title="Options"
                (click)="toggleMenu(chapter.id); $event.stopPropagation()">
                <i class="bi bi-three-dots-vertical"></i>
              </button>
              <ul class="ch-dropdown"
                  [style.display]="openMenuId === chapter.id ? 'block' : 'none'"
                  (click)="$event.stopPropagation()">
                <li>
                  <button type="button" class="ch-dropdown-item text-danger"
                    (click)="deleteChapters(chapter.id); closeMenu()">
                    <i class="bi bi-trash3 me-2"></i>Delete
                  </button>
                </li>
              </ul>
            </div>
          </div>
          <div class="ch-card-body">
            <div class="ch-card-date">
              <i class="bi bi-calendar3 me-2"></i>Created on: {{ chapter.createdAt | date:'MMM d, y' }}
            </div>
            <div class="ch-card-formation">
              <span class="fw-semibold me-1">Training:</span>
              <span class="badge bg-primary">{{ formation.nomFormation }}</span>
            </div>
          </div>
        </div>
      </div>
    </ng-container>

    <div *ngIf="getAllChapters()?.length === 0" class="col-12 text-center py-5 text-muted">
      <i class="bi bi-journal-x ch-empty-icon"></i>
      <p class="mt-3">No chapters available.</p>
    </div>
  </div>
</main>
