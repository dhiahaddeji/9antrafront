<main class="gx-5 pt-3">
  <div class="d-lg-none d-md-block"><br><br><br></div>

  <div class="d-flex align-items-center justify-content-between mb-4">
    <div class="pagetitle mb-0">
      <h1>Add Chapter</h1>
      <nav>
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a routerLink="/admin">Home</a></li>
          <li class="breadcrumb-item"><a routerLink="/admin/chapters/list">Chapters</a></li>
          <li class="breadcrumb-item active">Add</li>
        </ol>
      </nav>
    </div>
  </div>

  <div class="container d-flex justify-content-center">
    <div class="ch-card col-md-7 col-lg-6">
      <h2 class="ch-card-title">
        <i class="bi bi-journal-plus me-2"></i>New Chapter
      </h2>

      <form (ngSubmit)="addChapters()">
        <!-- Training select -->
        <div class="ch-field">
          <label class="ch-label" for="Formation">
            Training <span class="ch-required">*</span>
          </label>
          <select [(ngModel)]="Formation" name="Formation" id="Formation" class="ch-select" required>
            <option value="" disabled selected>Select a Training…</option>
            <option *ngFor="let x of tabFormation" [value]="x.id">{{ x.nomFormation }}</option>
          </select>
        </div>

        <!-- Chapter name -->
        <div class="ch-field">
          <label class="ch-label" for="name">
            Chapter name <span class="ch-required">*</span>
          </label>
          <input
            [(ngModel)]="Namechapter" name="Namechapter"
            type="text" id="name" class="ch-input"
            placeholder="e.g. Introduction to JavaScript"
            required>
        </div>

        <!-- Description (optional) -->
        <div class="ch-field">
          <label class="ch-label" for="description">Description</label>
          <textarea
            [(ngModel)]="description" name="description"
            id="description" class="ch-textarea" rows="4"
            placeholder="Brief description of this chapter (optional)"></textarea>
        </div>

        <!-- Error -->
        <div *ngIf="errorMessage" class="ch-error">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMessage }}
        </div>

        <!-- Actions -->
        <div class="ch-actions">
          <button type="button" class="ch-btn-cancel" routerLink="/admin/chapters/list">
            Cancel
          </button>
          <button type="submit" class="ch-btn-submit">
            <i class="bi bi-check2 me-2"></i>Add Chapter
          </button>
        </div>
      </form>
    </div>
  </div>
</main>
