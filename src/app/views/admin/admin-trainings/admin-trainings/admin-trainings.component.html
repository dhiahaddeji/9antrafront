<main class="gx-5 pt-3">
  <div class="d-lg-none d-md-block"><br /><br /><br /></div>

  <!-- Header -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div class="pagetitle mb-0">
      <h1>Trainings</h1>
      <nav>
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a routerLink="/admin">Home</a></li>
          <li class="breadcrumb-item active">Trainings</li>
        </ol>
      </nav>
    </div>
    <button type="button" class="btn register px-4 py-2" routerLink="/admin/trainingsform">
      <i class="bi bi-plus-lg me-2"></i>Add New
    </button>
  </div>

  <!-- Cards grid — one col per formation -->
  <div class="row g-4">
    <ng-container *ngFor="let category of getFilteredCategories()">
      <div class="col-xl-4 col-md-6" *ngFor="let formation of category?.formations">
        <div class="tr-card">
          <!-- Card header -->
          <div class="tr-card-header">
            <span class="tr-card-title">{{ formation.nomFormation }}</span>
            <div class="position-relative">
              <button type="button" title="Options" class="tr-menu-btn" (click)="toggleMenu(formation.id); $event.stopPropagation()">
                <i class="bi bi-three-dots-vertical"></i>
              </button>
              <ul class="tr-dropdown"
                [class.show]="openMenuId === formation.id"
                [style.display]="openMenuId === formation.id ? 'block' : 'none'"
                (click)="$event.stopPropagation(); closeMenu()">
                <li>
                  <button type="button" class="tr-dropdown-item" [routerLink]="['/admin/trainingsUpdate', formation.id]">
                    <i class="bi bi-pencil-square me-2"></i>Update
                  </button>
                </li>
                <li>
                  <button type="button" class="tr-dropdown-item text-danger" (click)="deleteFormation(formation.id); closeMenu()">
                    <i class="bi bi-trash3 me-2"></i>Delete
                  </button>
                </li>
              </ul>
            </div>
          </div>

          <!-- Card body -->
          <div class="tr-card-body">
            <div class="tr-card-date">
              <i class="bi bi-calendar3 me-2"></i>Created on : {{ formation.createdAt | date:'MMM d, y' }}
            </div>
            <div class="tr-card-category">
              <span class="fw-semibold me-1">Category:</span>
              <span class="badge bg-primary">{{ category.nomCate }}</span>
            </div>
          </div>
        </div>
      </div>
    </ng-container>

    <!-- Empty state -->
    <div *ngIf="getFilteredCategories().length === 0" class="col-12 text-center py-5 text-muted">
      <i class="bi bi-journal-x tr-empty-icon"></i>
      <p class="mt-3">No trainings available.</p>
    </div>
  </div>
</main>
