<main class="gx-5 pt-3">
  <div class="d-lg-none d-md-block"><br /><br /><br /></div>
  <div class="pagetitle">
    <h1>Feedback</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
        <li class="breadcrumb-item active">Dashboard</li>
      </ol>
    </nav>
  </div>
  <!-- End Page Title -->

  <!-- Feedback section -->
  <div class="container">
    <div class="row">
      <li></li>
      <div class="col-lg-4 col-md-6" *ngFor="let i of tabFeedback">
        <div class="card shadow-sm mb-4">
          <div class="d-flex align-items-center mt-4 mx-2">
            <img
              [src]="i.user?.image ? baseUrl + '/uploads/Documents/' + i.user.image : 'assets/img/9ant.png'"
              alt="Profile"
              width="50px"
              height="50px"
              class="rounded-circle"
              onerror="this.src='assets/img/9ant.png';"
            />
            <span class="ps-3 fw-bold">{{ i.user.firstName }} {{ i.user.lastName }}</span>
            <span class="ms-auto position-relative">
              <button
                type="button"
                title="Feedback options"
                class="feedback-menu-btn"
                (click)="toggleDropdown(i.id, $event)"
              >
                <i class="bi bi-three-dots-vertical"></i>
              </button>
              <ul *ngIf="openDropdownId === i.id" class="dropdown-menu show feedback-dropdown">
                <li *ngIf="i.posted == true">
                  <button type="button" (click)="updateFeedback(i.id)" class="dropdown-item">
                    <i class="bi bi-eye-slash me-2"></i>Unpublish
                  </button>
                </li>
                <li *ngIf="i.posted == false">
                  <button type="button" (click)="updateFeedback(i.id)" class="dropdown-item">
                    <i class="bi bi-eye me-2"></i>Publish
                  </button>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                  <button type="button" (click)="deleteFeedback(i.id)" class="dropdown-item text-danger">
                    <i class="fa-regular fa-trash-can me-2"></i>Delete
                  </button>
                </li>
              </ul>
            </span>
          </div>
          <div class="mx-3 mt-2">
            <p class="mb-1 text-secondary small">Added {{ i.createdAt | date }}</p>
            <p class="mb-0 text-secondary small">
              Rating: <span [innerHTML]="generateStarHTML(i.rating)"></span>
            </p>
          </div>

          <div class="card-body comment">
            <p class="card-text">{{ i.comment }}</p>
          </div>
        </div>
      </div>
      <div *ngIf="tabFeedback?.length == 0" class="text-center mt-3 d-flex justify-content-center">
        <div class="nodata">
          <img src="../../../../../assets/img/nodata.png" width="250px"><br>
          <p style="overflow: hidden;">There are no feedbacks available.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- End Feedback section -->
</main>
<!-- End #main -->
