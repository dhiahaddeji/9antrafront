<main>
    <div class="d-lg-none d-md-block"><br><br><br></div>
    <div class="pagetitle">
      <h1>Add Project Owner</h1>
      <nav>
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="index.html">Home</a></li>
          <li class="breadcrumb-item active">Dashboard</li>
        </ol>
      </nav>
    </div><!-- End Page Title -->
  
    <!-- ======= Profile Section ======= -->
    <div class="container">
      <div class="main-body">
        <form (ngSubmit)="save()"  #foodForm="ngForm">
          <div class="row gutters-sm mt-5 justify-content-center">
          <div class="col-md-8 col-lg-6">
            <div class="card">
              <div class="card-body">
               <div class="form-group mb-3">
                    
                  <label for="title">Last Name:</label>
                  <input class="form-control" type="text" id="title" [(ngModel)]="project.nom" name="title" required #thisTitle="ngModel">
                  <div class="alert alert-danger" *ngIf="thisTitle.touched && thisTitle.invalid">
                    <div *ngIf="thisTitle?.errors?.['required']">Last Name is required!</div>
                  </div>
                  </div>  
                  <div class="form-group mb-3">
                    <label for="prenom">First Name</label>
                    <input class="form-control" type="text" id="prenom" [(ngModel)]="project.prenom" name="prenom" required #prenom="ngModel">
                  <div class="alert alert-danger" *ngIf="prenom.touched && prenom.invalid">
                    <div *ngIf="prenom?.errors?.['required']">First Name is required!</div>
                  </div>
                  </div> 
        
                  <div class="form-group mb-3">
                    <label for="numtel">Phone</label>
                    <input class="form-control" type="number" id="prenom" [(ngModel)]="project.numtel" name="numtel" required #numtel="ngModel">
                    <div class="alert alert-danger" *ngIf="numtel.touched && numtel.invalid">
                      <div *ngIf="numtel?.errors?.['required']">Phone is required!</div>
                    </div>                  </div>
        
                  <div class="form-group mb-3">
                    <label for="nbProjects">Email</label>
                    <input class="form-control" type="text" id="email" [(ngModel)]="project.email" name="email" required #email="ngModel">
                    <div class="alert alert-danger" *ngIf="email.touched && email.invalid">
                      <div *ngIf="numtel?.errors?.['required']">Email is required!</div>
                    </div>                  </div>
        
                  <div class="form-group mb-3">
                    <label for="nbMeetings">Image</label>
                    <input type="file" (change)="onFileChange($event)" class="form-control-file" id="file"  name="file" accept="image/*" required>                  </div>
        <div *ngIf="imagePreview">
  <img [src]="imagePreview" alt="Preview" style="max-width: 200px; max-height: 200px;" loading="lazy">
</div>
                
        
               
                </div>
                <div class="row d-flex justify-content-end">
                  <div class="col-2">
                    <button type="submit" [disabled]="!foodForm.form.valid" class="btn" style="background-color: #AF3065; color: white; border-radius: 5px;">
                      {{ isEdit ? 'Update' : 'Create' }}
                    </button>
                  </div>
                  <div></div>
                  <br>
                </div>
              </div>
            </div>
          </div>
  
        <div class="row mt-5">
        </div>
      </form>
      </div>
  
      <div class="row bg-white shadow d-flex justify-content-center">
        <div class="col-6">
          <!-- Place additional content here -->
        </div>
      </div>
    </div>
  
    


    <div class="data_table card1 mt-4 " style="overflow-y: scroll; height:600px;">
     
      </div>
    

  </main><!-- End #main -->
