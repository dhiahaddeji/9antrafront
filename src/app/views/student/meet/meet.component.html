<!-- ── Loading ───────────────────────────────────────────────────────── -->
<div class="lobby-wrap" *ngIf="loading">
  <div class="lobby-loading">
    <div class="spinner-ring"></div>
    <p>Loading session…</p>
  </div>
</div>

<!-- ── Error ─────────────────────────────────────────────────────────── -->
<div class="lobby-wrap" *ngIf="!loading && error">
  <div class="lobby-error">
    <i class="bi bi-exclamation-triangle-fill"></i>
    <p>{{ error }}</p>
    <button type="button" class="btn-back" (click)="goBack()">Back to Calendar</button>
  </div>
</div>

<!-- ── Jitsi in-page embed ──────────────────────────────────────────── -->
<div class="jitsi-frame" *ngIf="!loading && mode === 'jitsi'">
  <div class="jitsi-bar">
    <span class="jitsi-bar-title">
      <i class="bi bi-broadcast-pin"></i> {{ session?.sessionName }}
    </span>
    <button type="button" class="btn-leave" (click)="leaveJitsi()">
      <i class="bi bi-telephone-x-fill"></i> Leave
    </button>
  </div>
  <div id="jitsi-embed" class="jitsi-embed"></div>
</div>

<!-- ── Google Meet redirect screen ──────────────────────────────────── -->
<div class="lobby-wrap" *ngIf="!loading && mode === 'gmeet' && session">
  <div class="lobby-card">
    <div class="lobby-header">
      <button type="button" class="btn-back-icon" (click)="goBack()">
        <i class="bi bi-arrow-left"></i>
      </button>
      <div class="lobby-badge gmeet-badge">
        <i class="bi bi-camera-video-fill"></i> Google Meet
      </div>
    </div>

    <h1 class="lobby-title">{{ session.sessionName }}</h1>

    <div class="gmeet-redirect-box">
      <div class="gmeet-icon-wrap">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" width="48" height="48">
          <path d="M44 24c0-2.2-.2-4.3-.6-6.3H24v11.9h11.3c-.5 2.6-2 4.8-4.2 6.3v5.2h6.8C41.6 37.1 44 30.9 44 24z" fill="#4285F4"/>
          <path d="M24 44c5.7 0 10.5-1.9 14-5.1l-6.8-5.2c-1.9 1.3-4.3 2-7.2 2-5.5 0-10.2-3.7-11.9-8.8H5.1v5.4C8.6 39.8 15.8 44 24 44z" fill="#34A853"/>
          <path d="M12.1 26.9c-.4-1.3-.7-2.6-.7-4s.2-2.7.7-4V13.5H5.1C3.8 16.1 3 19 3 22s.8 5.9 2.1 8.4l7-5.5z" fill="#FBBC05"/>
          <path d="M24 9.5c3.1 0 5.9 1.1 8.1 3.2l6.1-6.1C34.5 3.1 29.6 1 24 1 15.8 1 8.6 5.2 5.1 11.6l7 5.4C13.8 13.2 18.5 9.5 24 9.5z" fill="#EA4335"/>
        </svg>
      </div>
      <p class="gmeet-redirect-msg">Google Meet opened in a new tab.</p>
      <p class="gmeet-redirect-sub">If it didn't open automatically:</p>
      <button type="button" class="btn-platform btn-gmeet" (click)="openMeetManually()">
        <i class="bi bi-box-arrow-up-right"></i> Open Google Meet
      </button>
    </div>

    <button type="button" class="btn-back-full" (click)="goBack()">
      <i class="bi bi-arrow-left"></i> Back to Calendar
    </button>
  </div>
</div>
