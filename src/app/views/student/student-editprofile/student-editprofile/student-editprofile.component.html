<main id="main" class="main">
  <div class="d-lg-none d-md-block" style="height:70px;"></div>

  <div class="pagetitle">
    <h1>Edit Profile</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a routerLink="/student">Home</a></li>
        <li class="breadcrumb-item"><a routerLink="/student/profile">Profile</a></li>
        <li class="breadcrumb-item active">Edit</li>
      </ol>
    </nav>
  </div>

  <div class="row g-4" *ngIf="data">

    <!-- Left: Avatar + Upload -->
    <div class="col-lg-3 col-md-4">
      <div class="card avatar-side-card text-center">
        <div class="card-body p-4">
          <div class="avatar-wrapper mb-3">
            <img
              id="editPreviewImg"
              [src]="previewSrc || 'assets/img/profile-img.jpg'"
              onerror="this.src='assets/img/profile-img.jpg'"
              alt="Profile"
              class="avatar-img rounded-circle" loading="lazy" />
          </div>
          <h6 class="fw-bold mb-1">{{ data.firstName }} {{ data.lastName }}</h6>
          <p class="text-muted small mb-3">{{ data.username }}</p>

          <label for="editPhotoInput" class="btn btn-upload-photo w-100 mb-2">
            <i class="bi bi-camera me-2"></i>Change Photo
          </label>
          <input
            type="file"
            id="editPhotoInput"
            accept="image/*"
            class="d-none"
            (change)="onFileSelected($event); previewPhoto($event)"
          />
          <button
            *ngIf="photoSelected"
            type="button"
            class="btn btn-save-photo w-100"
            (click)="AddCoachForm()"
          >
            <i class="bi bi-cloud-upload me-2"></i>Upload Photo
          </button>
          <p class="text-muted" style="font-size:11px;" *ngIf="photoSelected">Click "Upload Photo" to save</p>
        </div>
      </div>
    </div>

    <!-- Right: Form -->
    <div class="col-lg-9 col-md-8">
      <div class="card form-card">
        <div class="card-body p-4">

          <h5 class="section-title">Personal Details</h5>
          <div class="row g-3 mt-1">
            <div class="col-sm-6">
              <div class="form__group">
                <input [(ngModel)]="firstNameInp" type="text" class="form__field" placeholder="First Name">
                <label class="form__label">First Name</label>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form__group">
                <input [(ngModel)]="lastNameInp" type="text" class="form__field" placeholder="Last Name">
                <label class="form__label">Last Name</label>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form__group">
                <input [(ngModel)]="usernameInp" type="email" class="form__field" placeholder="Email" (blur)="checkEmailFormat()">
                <label class="form__label">Email</label>
                <div *ngIf="emailInvalid" class="field-error">
                  <i class="bi bi-exclamation-circle me-1"></i>Invalid email format
                </div>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form__group">
                <input [(ngModel)]="phoneInp" type="text" class="form__field" placeholder="Phone">
                <label class="form__label">Phone</label>
              </div>
            </div>
          </div>

          <h5 class="section-title mt-4">Security</h5>
          <div class="row g-3 mt-1">
            <div class="col-sm-6">
              <div class="form__group">
                <input [(ngModel)]="passwordInp" type="password" class="form__field" placeholder="New Password">
                <label class="form__label">New Password</label>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form__group">
                <input [(ngModel)]="cppasswordInp" type="password" class="form__field" placeholder="Confirm Password">
                <label class="form__label">Confirm Password</label>
              </div>
            </div>
          </div>

          <h5 class="section-title mt-4">About</h5>
          <div class="row mt-1">
            <div class="col-12">
              <div class="form__group">
                <textarea [(ngModel)]="aboutInp" class="form__field" placeholder="Tell us about yourself..." rows="3"></textarea>
                <label class="form__label">About</label>
              </div>
            </div>
          </div>

          <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
            <a routerLink="/student/profile" class="btn btn-cancel">
              <i class="bi bi-x-circle me-1"></i>Cancel
            </a>
            <button (click)="updateUser()" type="button" class="btn btn-update">
              <i class="bi bi-check-circle me-1"></i>Save Changes
            </button>
          </div>

        </div>
      </div>
    </div>

  </div>
</main>
